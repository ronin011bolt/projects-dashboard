<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects Dashboard</title>
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: #0f172a;
      color: #e2e8f0;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .muted {
      color: #94a3b8;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #1d4ed8;
      font-size: 12px;
    }
    ul {
      padding-left: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0">Projects Dashboard</h1>
        <div class="muted">Private tracker for Chief's work</div>
      </div>
      <div class="badge">Ronin Bolt ⚡</div>
    </div>

    <div id="projects" class="grid"></div>
  </div>

  <script>
    async function load() {
      const res = await fetch('/api/projects');
      const data = await res.json();
      const root = document.getElementById('projects');
      root.innerHTML = data.projects.map(project => `
        <section class="card">
          <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;">
            <div>
              <h2 style="margin:0 0 8px 0">${project.name}</h2>
              <div class="muted">${project.id}</div>
            </div>
            <span class="badge">${project.status}</span>
          </div>
          <p>${project.summary || 'No summary yet.'}</p>
          <div class="muted">Updated: ${project.updatedAt}</div>
          <h3>Activities</h3>
          <ul>
            ${project.activities.map(a => `<li><strong>${a.date}</strong> — ${a.title}: ${a.note}</li>`).join('')}
          </ul>
        </section>
      `).join('');
    }
    load();
  </script>
</body>
</html>
