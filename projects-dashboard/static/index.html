<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #172033;
      --border: #243041;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-2: #1d4ed8;
      --green: #15803d;
      --yellow: #b45309;
      --red: #b91c1c;
      --gray: #475569;
      --soft: #0b1220;
    }
    * { box-sizing: border-box; }
    body { font-family: Inter, system-ui, sans-serif; margin: 0; padding: 24px; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1240px; margin: 0 auto; }
    .top, .row, .status-bar { display: flex; gap: 12px; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .top { margin-bottom: 24px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
    .grid { display: grid; grid-template-columns: 340px 1fr; gap: 16px; }
    .stack { display: grid; gap: 16px; }
    .project-list, .activities, .bullet-list { display: grid; gap: 10px; }
    .project-item, .activity, .mini-card { padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--soft); }
    .project-item.active { border-color: var(--accent); background: var(--panel-2); }
    .muted { color: var(--muted); }
    .badge, .tag { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; }
    .badge { background: var(--accent-2); }
    .tag { background: #1e293b; color: #cbd5e1; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    input, select, textarea, button { width: 100%; border-radius: 10px; border: 1px solid var(--border); background: #0b1324; color: var(--text); padding: 10px 12px; font: inherit; }
    textarea { min-height: 90px; resize: vertical; }
    button { background: var(--accent); border: none; cursor: pointer; font-weight: 600; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .three { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .dot { width: 12px; height: 12px; border-radius: 999px; display: inline-block; margin-right: 8px; }
    .dot.green { background: var(--green); }
    .dot.yellow { background: var(--yellow); }
    .dot.red { background: var(--red); }
    .dot.gray { background: var(--gray); }
    @media (max-width: 900px) { .grid, .two, .three { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0">Projects Dashboard</h1>
        <div class="muted">Private tracker for Luis Assardo</div>
      </div>
      <div class="badge">created by ronin ⚡️</div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="status-bar">
        <strong>Private access</strong>
        <span class="muted">Enter password to unlock the dashboard</span>
      </div>
      <div class="two">
        <input id="password" type="password" placeholder="Dashboard password" />
        <button onclick="savePassword()">Unlock</button>
      </div>
    </div>

    <div class="grid">
      <aside class="stack">
        <section class="card">
          <div class="status-bar">
            <strong>Projects</strong>
            <select id="statusFilter" onchange="renderProjects()">
              <option value="all">All statuses</option>
              <option value="planning">Planning</option>
              <option value="backlog">Backlog</option>
              <option value="active">Active</option>
              <option value="paused">Paused</option>
              <option value="blocked">Blocked</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div id="projectList" class="project-list"></div>
        </section>
      </aside>

      <main class="stack">
        <section class="card">
          <div id="projectDetail"></div>
        </section>

        <section class="card">
          <strong>Add activity</strong>
          <div class="stack" style="margin-top:12px;">
            <input id="activityTitle" placeholder="What happened?" />
            <textarea id="activityNote" placeholder="Short note"></textarea>
            <div class="three">
              <select id="activityStatus">
                <option value="">Keep current status</option>
                <option value="planning">Planning</option>
                <option value="backlog">Backlog</option>
                <option value="active">Active</option>
                <option value="paused">Paused</option>
                <option value="blocked">Blocked</option>
                <option value="done">Done</option>
              </select>
              <select id="activitySemaphore">
                <option value="">Keep semáforo</option>
                <option value="green">Green / alive</option>
                <option value="yellow">Yellow / in process</option>
                <option value="red">Red / blocked</option>
                <option value="gray">Gray / paused</option>
              </select>
              <input id="activitySummary" placeholder="Optional summary update" />
            </div>
            <button onclick="addActivity()">Add activity</button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    let state = { projects: [], selectedId: null };
    function passwordHeaders() {
      const pwd = localStorage.getItem('dashboardPassword') || '';
      return pwd ? { 'x-dashboard-password': pwd } : {};
    }
    function savePassword() {
      localStorage.setItem('dashboardPassword', document.getElementById('password').value);
      load();
    }
    async function request(url, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...passwordHeaders(), ...(options.headers || {}) };
      const res = await fetch(url, { ...options, headers });
      if (res.status === 401) throw new Error('Unauthorized. Check dashboard password.');
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || 'Request failed');
      }
      return res.json();
    }
    async function load() {
      try {
        const data = await request('/api/projects');
        state.projects = data.projects || [];
        if (!state.selectedId && state.projects.length) state.selectedId = state.projects[0].id;
        renderProjects();
        renderDetail();
      } catch (err) {
        document.getElementById('projectList').innerHTML = `<div class="muted">${err.message}</div>`;
        document.getElementById('projectDetail').innerHTML = `<div class="muted">Unlock dashboard to view projects.</div>`;
      }
    }
    function filteredProjects() {
      const filter = document.getElementById('statusFilter').value;
      return state.projects.filter(p => filter === 'all' || p.status === filter);
    }
    function semaphoreDot(value) {
      const safe = ['green', 'yellow', 'red', 'gray'].includes(value) ? value : 'gray';
      return `<span class="dot ${safe}"></span>`;
    }
    function renderProjects() {
      const list = filteredProjects();
      const root = document.getElementById('projectList');
      if (!list.length) {
        root.innerHTML = '<div class="muted">No projects for this filter.</div>';
        return;
      }
      if (!list.find(p => p.id === state.selectedId)) state.selectedId = list[0].id;
      root.innerHTML = list.map(project => `
        <div class="project-item ${project.id === state.selectedId ? 'active' : ''}" onclick="selectProject('${project.id}')">
          <div class="status-bar" style="margin-bottom:6px;">
            <strong>${project.name}</strong>
            <span class="badge">${project.status}</span>
          </div>
          <div class="muted">${project.id}</div>
          <div class="muted" style="margin-top:6px;">${semaphoreDot(project.semaphore)}${project.semaphore || 'unknown'}</div>
          <div class="muted" style="margin-top:6px;">Updated ${project.updatedAt}</div>
          ${project.stalledByLuis ? '<div class="tag" style="margin-top:8px;">waiting on Luis</div>' : ''}
        </div>
      `).join('');
      renderDetail();
    }
    function selectProject(id) {
      state.selectedId = id;
      renderProjects();
    }
    function renderBulletList(items, emptyText) {
      if (!items || !items.length) return `<div class="muted">${emptyText}</div>`;
      return `<div class="bullet-list">${items.map(item => `<div class="mini-card">${item}</div>`).join('')}</div>`;
    }
    function renderDetail() {
      const project = state.projects.find(p => p.id === state.selectedId);
      const root = document.getElementById('projectDetail');
      if (!project) {
        root.innerHTML = '<div class="muted">Select a project.</div>';
        return;
      }
      root.innerHTML = `
        <div class="status-bar">
          <div>
            <h2 style="margin:0">${project.name}</h2>
            <div class="muted">${project.id}</div>
          </div>
          <div class="status-bar">
            <span>${semaphoreDot(project.semaphore)}<span class="muted">${project.semaphore || 'unknown'}</span></span>
            <span class="badge">${project.status}</span>
          </div>
        </div>
        <p>${project.summary || 'No summary yet.'}</p>
        <div class="muted">Last update: ${project.updatedAt}</div>
        <div class="tags">${(project.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}${project.stalledByLuis ? '<span class="tag">waiting-on-luis</span>' : ''}</div>
        <div class="three" style="margin-top:16px;">
          <div>
            <strong>Next steps</strong>
            ${renderBulletList(project.nextSteps, 'No next steps defined.')}
          </div>
          <div>
            <strong>Blockers</strong>
            ${renderBulletList(project.blockers, 'No blockers recorded.')}
          </div>
          <div>
            <strong>Stall reason</strong>
            <div class="mini-card">${project.stalledByLuis ? (project.stalledReason || 'Waiting on Luis, reason not written yet.') : 'Not currently stalled by Luis.'}</div>
          </div>
        </div>
        <div class="activities" style="margin-top:16px;">
          ${(project.activities || []).length ? project.activities.map(a => `
            <div class="activity">
              <div><strong>${a.title}</strong></div>
              <div class="muted">${a.date}</div>
              <div style="margin-top:8px;">${a.note || ''}</div>
            </div>
          `).join('') : '<div class="muted">No activities yet.</div>'}
        </div>
      `;
    }
    async function addActivity() {
      if (!state.selectedId) return alert('Select a project first.');
      try {
        await request(`/api/projects/${state.selectedId}/activities`, {
          method: 'POST',
          body: JSON.stringify({
            title: document.getElementById('activityTitle').value.trim(),
            note: document.getElementById('activityNote').value.trim(),
            status: document.getElementById('activityStatus').value,
            semaphore: document.getElementById('activitySemaphore').value,
            summary: document.getElementById('activitySummary').value.trim()
          })
        });
        document.getElementById('activityTitle').value = '';
        document.getElementById('activityNote').value = '';
        document.getElementById('activityStatus').value = '';
        document.getElementById('activitySemaphore').value = '';
        document.getElementById('activitySummary').value = '';
        await load();
      } catch (err) {
        alert(err.message);
      }
    }
    load();
  </script>
</body>
</html>
